<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="/imagenes/favicon.png"
      type="image/x-icon"
    />
    <title>Cuenta Verificada - Control Cartos</title>
  </head>
  <body class="bg-light">
    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="row w-100 justify-content-center">
        <div class="col-12 col-md-5 col-lg-4">
          <div class="text-center mb-4">
            <h2 class="fw-bold text-uppercase">
              Cuenta <span class="text-primary">Verificada</span>
            </h2>
          </div>

          <div class="card shadow p-4 rounded border-0 bg-white text-center">
            <div class="mb-3 text-success">
              <i class="bi bi-check-circle-fill" style="font-size: 4rem"></i>
            </div>

            <div class="mb-4">
              <p class="text-muted">
                ¡Excelente! Tu cuenta ha sido verificada correctamente. Ya
                puedes acceder a todas las funciones de
                <strong>Control Cartos</strong>.
              </p>
              <p class="small text-secondary">
                Serás redirigido automáticamente en unos segundos...
              </p>
            </div>

            <hr class="my-4" />

            <div class="text-center">
              <a href="login.html" class="btn btn-primary w-100">
                Ir al inicio de sesión
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
