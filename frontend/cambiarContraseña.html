<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="/imagenes/favicon.png"
      type="image/x-icon"
    />
    <title>Cambiar Contraseña - Control Cartos</title>
  </head>
  <body class="bg-light">
    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="row w-100 justify-content-center">
        <div class="col-12 col-md-5 col-lg-4">
          <div class="text-center mb-4">
            <h2 class="fw-bold text-uppercase">
              Cambiar <span class="text-primary">Contraseña</span>
            </h2>
          </div>

          <div class="card shadow p-4 rounded border-0 bg-white">
            <form>
              <div class="mb-3">
                <label for="newPassword" class="form-label"
                  >Nueva Contraseña</label
                >
                <div class="input-group">
                  <span class="input-group-text"
                    ><i class="bi bi-lock"></i
                  ></span>
                  <input
                    type="password"
                    class="form-control"
                    id="newPassword"
                    placeholder="Mínimo 8 caracteres"
                    required
                  />
                </div>
              </div>

              <div class="mb-4">
                <label for="repeatPassword" class="form-label"
                  >Repetir Contraseña</label
                >
                <div class="input-group">
                  <span class="input-group-text"
                    ><i class="bi bi-lock-fill"></i
                  ></span>
                  <input
                    type="password"
                    class="form-control"
                    id="repeatPassword"
                    placeholder="Repite tu contraseña"
                    required
                  />
                </div>
              </div>

              <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">
                  Actualizar Contraseña
                </button>
              </div>

              <div class="mt-4 text-center">
                <a href="login.html" class="text-decoration-none small">
                  <i class="bi bi-arrow-left"></i> Volver al inicio de sesión
                </a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
