<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="/imagenes/favicon.png"
      type="image/x-icon"
    />
    <title>Control Cartos — Dashboard</title>
  </head>
  <body>
    <!-- NOTIFICACIONES -->
    <div
      class="position-fixed top-0 start-50 translate-middle-x pt-3"
      style="z-index: 9999; min-width: 300px"
      id="alertContainer"
    ></div>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark fixed-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="/imagenes/logo.png" alt="logo" class="me-2 img_logo" />
          <span class="d-none d-sm-inline"
            >Control <span class="text-success">Cartos</span></span
          >
        </a>
        <div class="text-center d-none d-md-block">
          <h6 class="text-white mb-0">
            Bienvenido <span class="text-success" id="welcoName"></span>
          </h6>
          <small class="text-secondary">Gestiona tus finanzas</small>
        </div>
        <div class="dropdown">
          <img
            src=""
            alt="perfil"
            width="38"
            height="38"
            class="rounded-circle border border-secondary foto-perfil"
            id="fotoDropdown"
            role="button"
            data-bs-toggle="dropdown"
            aria-expanded="false"
            style="cursor: pointer"
          />
          <ul
            class="dropdown-menu dropdown-menu-end dropdown-menu-dark"
            id="ul-foto"
          >
            <li>
              <a class="dropdown-item" href="perfil.html"
                ><i class="bi bi-person me-2"></i>Mi perfil</a
              >
            </li>
            <li>
              <a class="dropdown-item" href="categorias.html"
                ><i class="bi bi-tags me-2"></i>Categorías</a
              >
            </li>
            <li>
              <a class="dropdown-item" href="gastos.html"
                ><i class="bi bi-table me-2"></i>Gastos</a
              >
            </li>
            <li><hr class="dropdown-divider" /></li>
            <li>
              <a
                class="dropdown-item text-danger log-out"
                href="iniciarSesion.html"
                ><i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="container mt-5 pt-4">
      <!-- BOTONES DE ACCIÓN -->
      <div class="d-flex gap-2 flex-wrap mb-4" id="divBtnsAccion">
        <button class="btn btn-primary btn-acciones" data-title="agregarGasto">
          <i class="bi bi-plus-circle me-1"></i>Agregar gasto
        </button>
        <button
          class="btn btn-outline-primary btn-acciones"
          data-title="agregarGastoOCR"
        >
          <i class="bi bi-camera me-1"></i>Agregar gasto con OCR
        </button>
        <button
          class="btn btn-outline-secondary btn-acciones"
          data-title="categorias"
        >
          <i class="bi bi-tags me-1"></i>Categorías
        </button>
        <button
          class="btn btn-outline-secondary btn-acciones"
          data-title="tablaGastos"
        >
          <i class="bi bi-table me-1"></i>Tabla de gastos
        </button>
      </div>

      <!-- TARJETAS PRESUPUESTO -->
      <div class="row g-3 mb-4" id="cardPresupuesto">
        <div class="col-12 col-md-4">
          <div class="card shadow-sm border-0 h-100">
            <div class="card-body d-flex align-items-center gap-3">
              <div class="rounded-circle bg-primary bg-opacity-10 p-3">
                <i class="bi bi-wallet2 text-primary fs-4"></i>
              </div>
              <div>
                <p class="text-muted small mb-0">Presupuesto mensual</p>
                <h4 class="fw-bold mb-0" id="presupuestoMax">--- €</h4>
              </div>
            </div>
          </div>
        </div>
        <div class="col-12 col-md-4">
          <div class="card shadow-sm border-0 h-100">
            <div class="card-body d-flex align-items-center gap-3">
              <div class="rounded-circle bg-warning bg-opacity-10 p-3">
                <i class="bi bi-graph-up text-warning fs-4"></i>
              </div>
              <div class="w-100">
                <p class="text-muted small mb-0">Utilizado</p>
                <h4 class="fw-bold mb-1" id="totalGastado">--- €</h4>
                <div class="progress" style="height: 6px">
                  <div
                    class="progress-bar"
                    id="barraGlobal"
                    style="width: 0%"
                  ></div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-12 col-md-4">
          <div class="card shadow-sm border-0 h-100">
            <div class="card-body d-flex align-items-center gap-3">
              <div class="rounded-circle bg-success bg-opacity-10 p-3">
                <i class="bi bi-piggy-bank text-success fs-4"></i>
              </div>
              <div>
                <p class="text-muted small mb-0">Restante</p>
                <h4 class="fw-bold mb-0" id="presupuestoRestante">--- €</h4>
                <small id="mensajeGlobal" class="text-muted"></small>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- TARJETA BARRAS POR CATEGORÍA -->
      <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
          <h5 class="card-title text-muted mb-3">Gastos por categoría</h5>
          <div id="cardCategorias"></div>
        </div>
      </div>

      <!-- TARJETA GRÁFICA -->
      <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="card-title text-muted mb-0">Evolución de gastos</h5>
            <div class="btn-group btn-group-sm" id="divBtnsGrafica">
              <button class="btn btn-outline-primary active" id="btnMesActual">
                Mes actual
              </button>
              <button class="btn btn-outline-primary" id="btnMesAnterior">
                Mes anterior
              </button>
              <button class="btn btn-outline-primary" id="btnHistorico">
                Histórico
              </button>
            </div>
          </div>
          <canvas id="grafica"></canvas>
        </div>
      </div>
    </main>

    <!-- MODAL AGREGAR GASTO -->
    <div
      class="modal fade"
      id="modalAgregarGasto"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">Agregar gasto</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="formAgregarGasto">
              <div class="mb-3">
                <label class="form-label">Monto</label>
                <input
                  type="number"
                  class="form-control"
                  name="monto"
                  placeholder="0.00"
                  step="0.01"
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Categoría</label>
                <select
                  class="form-select"
                  name="nombre_categoria"
                  id="selectCategorias"
                ></select>
              </div>
              <div class="mb-3">
                <label class="form-label"
                  >Descripción <span class="text-muted">(opcional)</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  name="descripcion"
                  maxlength="20"
                  placeholder="Maximo 20 caracteres"
                />
              </div>
            </form>
          </div>

          <div class="modal-footer">
            <button
              type="submit"
              form="formAgregarGasto"
              class="btn btn-primary"
              id="btnGuardarGasto"
            >
              Guardar gasto
            </button>
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL AGREGAR GASTO CON OCR -->
    <div
      class="modal fade"
      id="modalAgregarGastoOCR"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">Agregar gasto con OCR</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="formAgregarGastoOCR">
              <div class="mb-3">
                <label class="form-label">Sube tu ticket</label>
                <input
                  type="file"
                  class="form-control"
                  id="ocrArchivo"
                  accept="image/*,.pdf"
                />
                <small class="text-muted"
                  >Formatos permitidos: JPG, PNG, PDF</small
                >
              </div>
              <div class="mb-3">
                <label class="form-label">Monto</label>
                <input
                  type="number"
                  class="form-control"
                  id="ocrMonto"
                  placeholder="Se rellenará automáticamente"
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Categoría</label>
                <select class="form-select" id="ocrCategoria">
                  <option value="">Selecciona una categoría</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label"
                  >Descripción <span class="text-muted">(opcional)</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  id="ocrDescripcion"
                  maxlength="20"
                  placeholder="Maximo 20 caracteres"
                />
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-outline-primary me-2"
              id="btnProcesarOCR"
            >
              <i class="bi bi-camera me-1"></i>Procesar ticket
            </button>
            <button
              type="submit"
              form="formAgregarGastoOCR"
              class="btn btn-primary"
              id="btnGuardarGastoOCR"
            >
              Guardar gasto
            </button>
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/dashboard.js" defer></script>
  </body>
</html>
