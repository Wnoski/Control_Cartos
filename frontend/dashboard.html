<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="/imagenes/favicon.png"
      type="image/x-icon"
    />
    <title>Control Cartos — Dashboard</title>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark fixed-top">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="#">
          <img src="/imagenes/logo.png" alt="logo" class="me-2 img_logo" />
          <span class="d-none d-sm-inline"
            >Control <span class="text-success">Cartos</span></span
          >
        </a>

        <div class="text-center d-none d-md-block">
          <h6 class="text-white mb-0">Bienvenido de nuevo</h6>
          <small class="text-secondary">Gestiona tus finanzas</small>
        </div>

        <div class="dropdown">
          <img
            src="/imagenes/avatar.png"
            alt="perfil"
            width="38"
            height="38"
            class="rounded-circle border border-secondary"
            role="button"
            data-bs-toggle="dropdown"
            aria-expanded="false"
            style="cursor: pointer; object-fit: cover"
          />
          <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
            <li>
              <a class="dropdown-item" href="perfil.html"
                ><i class="bi bi-person me-2"></i>Mi perfil</a
              >
            </li>
            <li>
              <a class="dropdown-item" href="categorias.html"
                ><i class="bi bi-tags me-2"></i>Categorías</a
              >
            </li>
            <li><hr class="dropdown-divider" /></li>
            <li>
              <a class="dropdown-item text-danger" href="login.html"
                ><i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="container mt-5 pt-4">
      <!-- BOTONES DE ACCIÓN -->
      <div class="d-flex gap-2 flex-wrap mb-4">
        <button
          class="btn btn-success"
          data-bs-toggle="modal"
          data-bs-target="#modalAgregarGasto"
        >
          <i class="bi bi-plus-circle me-1"></i>Agregar gasto
        </button>
        <button
          class="btn btn-outline-success"
          data-bs-toggle="modal"
          data-bs-target="#modalAgregarGastoOCR"
        >
          <i class="bi bi-camera me-1"></i>Agregar gasto con OCR
        </button>
        <button class="btn btn-outline-light">
          <i class="bi bi-tags me-1"></i>Categorías
        </button>
      </div>

      <!-- TARJETA PRESUPUESTO GLOBAL -->
      <div class="card bg-dark border-secondary text-white mb-4">
        <div class="card-body" id="cardPresupuesto"></div>
      </div>

      <!-- TARJETA BARRAS POR CATEGORÍA -->
      <div class="card bg-dark border-secondary text-white mb-4">
        <div class="card-body">
          <h5 class="card-title text-secondary mb-3">Gastos por categoría</h5>
          <div id="cardCategorias">
            <!-- Se rellena con JS -->
          </div>
        </div>
      </div>

      <!-- TARJETA GRÁFICA -->
      <div class="card bg-dark border-secondary text-white mb-4">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="card-title text-secondary mb-0">Evolución de gastos</h5>
            <div class="btn-group btn-group-sm">
              <button class="btn btn-outline-success active">Mes actual</button>
              <button class="btn btn-outline-success">Mes anterior</button>
              <button class="btn btn-outline-success">3 meses</button>
            </div>
          </div>
          <canvas id="grafica"> </canvas>
        </div>
      </div>
    </main>

    <!-- MODAL AGREGAR GASTO -->
    <div
      class="modal fade"
      id="modalAgregarGasto"
      tabindex="-1"
      aria-labelledby="modalAgregarGastoLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content bg-dark text-white border-secondary">
          <div class="modal-header border-secondary">
            <h5 class="modal-title" id="modalAgregarGastoLabel">
              Agregar gasto
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Cerrar"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Monto</label>
              <input
                type="number"
                class="form-control bg-dark text-white border-secondary"
                id="gastoMonto"
                placeholder="0.00"
                step="0.01"
              />
            </div>
            <div class="mb-3">
              <label class="form-label">Categoría</label>
              <select
                class="form-select bg-dark text-white border-secondary"
                id="gastoCategoria"
              >
                <option value="">Selecciona una categoría</option>
                <!-- Se rellena con JS -->
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label"
                >Descripción
                <span class="text-secondary">(opcional)</span></label
              >
              <input
                type="text"
                class="form-control bg-dark text-white border-secondary"
                id="gastoDescripcion"
                placeholder="Ej: Mercadona"
              />
            </div>
          </div>
          <div class="modal-footer border-secondary">
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button type="button" class="btn btn-success" id="btnGuardarGasto">
              Guardar gasto
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL AGREGAR GASTO CON OCR -->
    <div
      class="modal fade"
      id="modalAgregarGastoOCR"
      tabindex="-1"
      aria-labelledby="modalAgregarGastoOCRLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content bg-dark text-white border-secondary">
          <div class="modal-header border-secondary">
            <h5 class="modal-title" id="modalAgregarGastoOCRLabel">
              Agregar gasto con OCR
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Cerrar"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Sube tu ticket</label>
              <input
                type="file"
                class="form-control bg-dark text-white border-secondary"
                id="ocrArchivo"
                accept="image/*,.pdf"
              />
              <small class="text-secondary"
                >Formatos permitidos: JPG, PNG, PDF</small
              >
            </div>
            <div class="mb-3">
              <label class="form-label">Monto</label>
              <input
                type="number"
                class="form-control bg-dark text-white border-secondary"
                id="ocrMonto"
                placeholder="Se rellenará automáticamente"
              />
            </div>
            <div class="mb-3">
              <label class="form-label">Categoría</label>
              <select
                class="form-select bg-dark text-white border-secondary"
                id="ocrCategoria"
              >
                <option value="">Selecciona una categoría</option>
                <!-- Se rellena con JS -->
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label"
                >Descripción
                <span class="text-secondary">(opcional)</span></label
              >
              <input
                type="text"
                class="form-control bg-dark text-white border-secondary"
                id="ocrDescripcion"
                placeholder="Se rellenará automáticamente"
              />
            </div>
          </div>
          <div class="modal-footer border-secondary">
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="button"
              class="btn btn-outline-success me-2"
              id="btnProcesarOCR"
            >
              <i class="bi bi-camera me-1"></i>Procesar ticket
            </button>
            <button
              type="button"
              class="btn btn-success"
              id="btnGuardarGastoOCR"
            >
              Guardar gasto
            </button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/dashboard.js" defer></script>
  </body>
</html>
