<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="/imagenes/favicon.png"
      type="image/x-icon"
    />
    <title>Recuperación de Contraseña</title>
  </head>
  <body class="bg-light">
    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="row w-100 justify-content-center">
        <div class="col-12 col-md-5 col-lg-4">
          <div class="text-center mb-4">
            <h2 class="fw-bold text-uppercase">
              Recuperar <span class="text-primary">Contraseña</span>
            </h2>
          </div>

          <div class="card shadow p-4 rounded border-0 bg-white">
            <div class="mb-4">
              <p class="text-muted small">
                Si tu correo existe en nuestra base de datos, te enviaremos un
                enlace para restablecer tu contraseña.
              </p>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Correo Electrónico</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="bi bi-envelope"></i
                ></span>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  placeholder="nombre@ejemplo.com"
                  required
                />
              </div>
            </div>

            <div class="d-grid gap-2">
              <button type="text" class="btn btn-primary" id="btnEnviar">
                Enviar Correo
              </button>
            </div>

            <div class="mt-4 text-center">
              <a href="iniciarSesion.html" class="text-decoration-none small">
                <i class="bi bi-arrow-left"></i> Volver al inicio de sesión
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/recuperarContraseña.js"></script>
  </body>
</html>
