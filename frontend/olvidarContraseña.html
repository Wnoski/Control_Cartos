<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="/imagenes/favicon.png"
      type="image/x-icon"
    />
    <title>Recuperar contraseña — Control Cartos</title>
  </head>
  <body>
    <!-- NOTIFICACIONES -->
    <div
      class="position-fixed top-0 start-50 translate-middle-x pt-3"
      style="z-index: 9999; min-width: 300px"
      id="alertContainer"
    ></div>

    <!-- BOTÓN VOLVER -->
    <div class="position-fixed top-0 start-0 p-3">
      <a href="index.html" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-house me-1"></i>Página principal
      </a>
    </div>

    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="row w-100 justify-content-center">
        <div class="col-12 col-md-5 col-lg-4">
          <div class="text-center mb-4">
            <h2 class="fw-bold app-title">CONTROL <span>CARTOS</span></h2>
            <p class="text-muted small">Recupera el acceso a tu cuenta</p>
          </div>

          <div class="card shadow border-0 p-4">
            <p class="text-muted small mb-4">
              Si tu correo existe en nuestra base de datos te enviaremos un
              enlace para restablecer tu contraseña.
            </p>
            <div class="mb-3">
              <label for="email" class="form-label">Correo electrónico</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="bi bi-envelope"></i
                ></span>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  placeholder="nombre@ejemplo.com"
                  required
                />
              </div>
            </div>
            <div class="d-grid mb-3">
              <button type="button" class="btn btn-primary" id="btnEnviar">
                Enviar correo
              </button>
            </div>
            <div class="text-center">
              <a
                href="iniciarSesion.html"
                class="text-decoration-none small text-muted"
              >
                <i class="bi bi-arrow-left me-1"></i>Volver al inicio de sesión
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="js/utils.js"></script>
    <script src="js/recuperarContraseña.js"></script>
  </body>
</html>
