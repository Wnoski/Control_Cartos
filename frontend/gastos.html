<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css"
    />

    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="/imagenes/favicon.png"
      type="image/x-icon"
    />
    <style>
      body {
        font-family: "Sora", sans-serif;
        background-color: #f8f9fa;
      }
    </style>
    <title>Control Cartos — Gastos</title>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark fixed-top">
      <div class="container-fluid">
        <div class="d-flex align-items-center gap-2">
          <a
            class="navbar-brand d-flex align-items-center"
            href="dashboard.html"
          >
            <img src="/imagenes/logo.png" alt="logo" class="me-2 img_logo" />
            <span class="d-none d-sm-inline"
              >Control <span class="text-primary">Cartos</span></span
            >
          </a>
          <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Dashboard
          </a>
        </div>
        <div class="dropdown">
          <img
            src="/imagenes/avatar.png"
            alt="perfil"
            width="38"
            height="38"
            class="rounded-circle border border-secondary"
            role="button"
            data-bs-toggle="dropdown"
            aria-expanded="false"
            style="cursor: pointer; object-fit: cover"
          />
          <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
            <li>
              <a class="dropdown-item" href="perfil.html"
                ><i class="bi bi-person me-2"></i>Mi perfil</a
              >
            </li>
            <li>
              <a class="dropdown-item" href="categorias.html"
                ><i class="bi bi-tags me-2"></i>Categorías</a
              >
            </li>
            <li>
              <a class="dropdown-item" href="dashboard.html"
                ><i class="bi bi-speedometer2 me-2"></i>Dashboard</a
              >
            </li>
            <li><hr class="dropdown-divider" /></li>
            <li>
              <a class="dropdown-item text-danger" href="login.html"
                ><i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="container mt-5 pt-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Mis gastos</h4>
        <div class="d-flex gap-2">
          <button class="btn btn-primary btn-sm" id="btnAbrirAgregarGasto">
            <i class="bi bi-plus-circle me-1"></i>Agregar gasto
          </button>
          <button
            class="btn btn-outline-primary btn-sm"
            id="btnAbrirAgregarGastoOCR"
          >
            <i class="bi bi-camera me-1"></i>Agregar con OCR
          </button>
        </div>
      </div>

      <!-- TABLA GASTOS -->
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <table class="table table-hover mb-0" id="tablaGastos">
            <thead class="table-light">
              <tr>
                <th>Fecha</th>
                <th>Descripción</th>
                <th>Categoría</th>
                <th>Monto</th>
                <th class="text-end">Acciones</th>
              </tr>
            </thead>
            <tbody id="bodyTablaGastos">
              <!-- Se rellena con JS -->
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <!-- MODAL AGREGAR GASTO -->
    <div
      class="modal fade"
      id="modalAgregarGasto"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">Agregar gasto</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="formAgregarGasto">
              <div class="mb-3">
                <label class="form-label">Monto</label>
                <input
                  type="number"
                  class="form-control"
                  name="monto"
                  placeholder="0.00"
                  step="0.01"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Categoría</label>
                <select
                  class="form-select"
                  name="nombre_categoria"
                  id="gastoCategoria"
                  required
                ></select>
              </div>
              <div class="mb-3">
                <label class="form-label"
                  >Descripción <span class="text-muted">(opcional)</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  name="descripcion"
                  placeholder="Ej: Mercadona"
                />
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="submit"
              form="formAgregarGasto"
              class="btn btn-primary"
            >
              Guardar gasto
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL EDITAR GASTO -->
    <div
      class="modal fade"
      id="modalEditarGasto"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-warning">
            <h5 class="modal-title">Editar gasto</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="formEditarGasto">
              <div class="mb-3">
                <label class="form-label">Monto</label>
                <input
                  type="number"
                  class="form-control"
                  id="editGastoMonto"
                  name="monto"
                  step="0.01"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Categoría</label>
                <select
                  class="form-select"
                  id="editGastoCategoria"
                  name="nombre_categoria"
                  required
                ></select>
              </div>
              <div class="mb-3">
                <label class="form-label"
                  >Descripción <span class="text-muted">(opcional)</span></label
                >
                <input
                  type="text"
                  class="form-control"
                  id="editGastoDescripcion"
                  name="descripcion"
                />
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="submit"
              form="formEditarGasto"
              class="btn btn-warning"
            >
              Actualizar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL CONFIRMAR ELIMINAR -->
    <div
      class="modal fade"
      id="modalEliminarGasto"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-sm">
        <div class="modal-content">
          <div class="modal-header bg-danger text-white">
            <h5 class="modal-title">Eliminar gasto</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <p>¿Estás seguro de que quieres eliminar este gasto?</p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="button"
              class="btn btn-danger"
              id="btnConfirmarEliminarGasto"
            >
              Eliminar
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <script src="js/gastos.js" defer></script>
  </body>
</html>
