<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="/imagenes/favicon.png"
      type="image/x-icon"
    />
    <title>Iniciar Sesion</title>
  </head>
  <body>
    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="row w-100 justify-content-center">
        <div class="col-12 col-md-5 col-lg-4">
          <div class="text-center mb-4">
            <h2 class="fw-bold">
              CONTROL <span class="text-primary">CARTOS</span>
            </h2>
          </div>

          <div class="login shadow p-4 rounded bg-white">
            <form id="formLogin">
              <div class="mb-3">
                <label for="emailLogin" class="form-label">Correo</label>
                <input type="email" class="form-control" id="emailLogin" />
              </div>

              <div class="mb-3">
                <label for="passwordLogin" class="form-label">Contraseña</label>
                <input
                  type="password"
                  class="form-control"
                  id="passwordLogin"
                />
              </div>

              <div class="mb-3 form-check">
                <input
                  type="checkbox"
                  class="form-check-input"
                  id="recordarLogin"
                />
                <label class="form-check-label" for="recordarLogin"
                  >Recordarme</label
                >
              </div>

              <div class="d-grid gap-2">
                <button
                  type="submit"
                  class="btn btn-primary"
                  id="btnEnviarLogin"
                >
                  Conectarse
                </button>
              </div>
            </form>
            <div class="mt-3 text-center">
              <a href="registrarse.html" class="d-block small">Registrarse</a>
              <a href="olvidarContraseña.html" class="d-block small"
                >¿Olvidaste tu contraseña?</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/iniciarSesion.js"></script>
  </body>
</html>
