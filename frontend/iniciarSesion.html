<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="/imagenes/favicon.png"
      type="image/x-icon"
    />
    <title>Iniciar Sesión — Control Cartos</title>
  </head>
  <body>
    <!-- NOTIFICACIONES -->
    <div
      class="position-fixed top-0 start-50 translate-middle-x pt-3"
      style="z-index: 9999; min-width: 300px"
      id="alertContainer"
    ></div>

    <!-- BOTÓN VOLVER -->
    <div class="position-fixed top-0 start-0 p-3">
      <a href="index.html" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-house me-1"></i>Página principal
      </a>
    </div>

    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="row w-100 justify-content-center">
        <div class="col-12 col-md-5 col-lg-4">
          <div class="text-center mb-4">
            <h2 class="fw-bold app-title">CONTROL <span>CARTOS</span></h2>
          </div>

          <div class="card shadow border-0 p-4">
            <form id="formLogin">
              <div class="mb-3">
                <label for="emailLogin" class="form-label">Correo</label>
                <input
                  type="email"
                  class="form-control"
                  id="emailLogin"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="passwordLogin" class="form-label">Contraseña</label>
                <input
                  type="password"
                  class="form-control"
                  id="passwordLogin"
                  required
                />
              </div>
              <input
                type="checkbox"
                class="form-check-input"
                id="mostrarContraseña"
              />
              <label class="form-check-label small" for="mostrarContraseña"
                >Mostrar Contraseña</label
              >

              <div class="mb-3 form-check">
                <input
                  type="checkbox"
                  class="form-check-input"
                  id="recordarLogin"
                />
                <label class="form-check-label small" for="recordarLogin"
                  >Recordarme</label
                >
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                  Conectarse
                </button>
              </div>
            </form>
            <div class="mt-3 text-center">
              <a
                href="registrarse.html"
                class="d-block small mb-1 text-decoration-none"
                >Registrarse</a
              >
              <a
                href="olvidarContraseña.html"
                class="d-block small text-decoration-none text-muted"
                >¿Olvidaste tu contraseña?</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="js/utils.js"></script>
    <script src="js/iniciarSesion.js"></script>
  </body>
</html>
