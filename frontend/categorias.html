<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="/imagenes/favicon.png"
      type="image/x-icon"
    />
    <style>
      body {
        font-family: "Sora", sans-serif;
        background-color: #f8f9fa;
      }
    </style>
    <title>Control Cartos — Categorías</title>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark fixed-top">
      <div class="container-fluid">
        <div class="d-flex align-items-center gap-2">
          <a
            class="navbar-brand d-flex align-items-center"
            href="dashboard.html"
          >
            <img src="/imagenes/logo.png" alt="logo" class="me-2 img_logo" />
            <span class="d-none d-sm-inline"
              >Control <span class="text-primary">Cartos</span></span
            >
          </a>
          <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Dashboard
          </a>
        </div>
        <div class="dropdown">
          <img
            src="/imagenes/avatar.png"
            alt="perfil"
            width="38"
            height="38"
            class="rounded-circle border border-secondary"
            role="button"
            data-bs-toggle="dropdown"
            aria-expanded="false"
            style="cursor: pointer; object-fit: cover"
          />
          <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
            <li>
              <a class="dropdown-item" href="perfil.html"
                ><i class="bi bi-person me-2"></i>Mi perfil</a
              >
            </li>
            <li>
              <a class="dropdown-item" href="dashboard.html"
                ><i class="bi bi-speedometer2 me-2"></i>Dashboard</a
              >
            </li>
            <li><hr class="dropdown-divider" /></li>
            <li>
              <a class="dropdown-item text-danger" href="login.html"
                ><i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="container mt-5 pt-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Mis categorías</h4>
        <button class="btn btn-primary btn-sm" id="btnAbrirAgregarCategoria">
          <i class="bi bi-plus-circle me-1"></i>Agregar categoría
        </button>
      </div>

      <!-- TABLA CATEGORIAS -->
      <div class="card shadow-sm border-0">
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>Categoría</th>
                <th>Límite mensual</th>
                <th class="text-end">Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaCategorias">
              <!-- Se rellena con JS -->
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <!-- MODAL AGREGAR CATEGORIA -->
    <div
      class="modal fade"
      id="modalAgregarCategoria"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">Agregar categoría</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="formAgregarCategoria">
              <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input
                  type="text"
                  class="form-control"
                  name="nombre"
                  placeholder="Ej: Alimentación"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Límite mensual</label>
                <input
                  type="number"
                  class="form-control"
                  name="monto_maximo"
                  placeholder="0.00"
                  step="0.01"
                  required
                />
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="submit"
              form="formAgregarCategoria"
              class="btn btn-primary"
              id="btnGuardarCategoria"
            >
              Guardar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL EDITAR CATEGORIA -->
    <div
      class="modal fade"
      id="modalEditarCategoria"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-warning">
            <h5 class="modal-title">Editar categoría</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="formEditarCategoria">
              <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input
                  type="text"
                  class="form-control"
                  id="editCategoriaNombre"
                  name="nombre"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Límite mensual</label>
                <input
                  type="number"
                  class="form-control"
                  id="editCategoriaMonto"
                  name="monto_maximo"
                  step="0.01"
                  required
                />
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="submit"
              form="formEditarCategoria"
              class="btn btn-warning"
              id="btnActualizarCategoria"
            >
              Actualizar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL CONFIRMAR ELIMINAR -->
    <div
      class="modal fade"
      id="modalEliminarCategoria"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-sm">
        <div class="modal-content">
          <div class="modal-header bg-danger text-white">
            <h5 class="modal-title">Eliminar categoría</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <p>
              ¿Estás seguro? Se eliminarán también todos los gastos asociados.
            </p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-outline-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="button"
              class="btn btn-danger"
              id="btnConfirmarEliminar"
            >
              Eliminar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="js/categorias.js" defer></script>
  </body>
</html>
